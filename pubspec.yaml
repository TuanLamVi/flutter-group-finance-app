name: group_finance_app
description: "Flutter Multi-Platform Group Finance Management App with Firebase"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.0
  firebase_auth: ^4.15.0

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Animation
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.8
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  pull_to_refresh: ^2.0.0
  intl: ^0.19.0
  
  # Utilities
  url_launcher: ^6.2.0
  uuid: ^4.0.0
  dartz: ^0.10.1
  equatable: ^2.0.5
  get_it: ^7.6.0
  
  # State Management (Optional - BLoC/Riverpod)
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  
  # Validation & Formatting
  mask_text_input_formatter: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
